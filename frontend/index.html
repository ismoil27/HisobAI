<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HisobAI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("hisobai-theme");
          const theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_error) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
